# ---------- Look & feel ----------
font_family      JetBrains Mono
font_size        12.0
enable_ligatures always

background_opacity 0.80
# Optional soft padding for a “framed” look
window_padding_width 8

# Cursor + bell
cursor_shape beam
enable_audio_bell no
visual_bell_duration 0.08

# Tab bar
tab_bar_style powerline
tab_bar_edge top
tab_title_template "{index}: {title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# Colors (pleasant dark base). Replace later with a real theme if you like.
foreground #d0d0d0
background #1e1f28
cursor     #a6e3a1
color0  #1e1f28
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #cba6f7
color6  #94e2d5
color7  #bac2de
color8  #45475a
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #cba6f7
color14 #94e2d5
color15 #a6adc8

# ---------- Quality of life ----------
copy_on_select yes
strip_trailing_spaces smart
detect_urls yes
open_url_with default

# Scrollback
scrollback_lines 100000

# ---------- Performance ----------
# GPU rendering is default; these keep it snappy on high-DPI / lots of glyphs
repaint_delay 7
input_delay 0
sync_to_monitor yes


# ---------- Kittens (handy tools) ----------
# Inline images, diff, themes browser live from terminal
# Try: kitty +kitten icat image.jpg
#      kitty +kitten diff fileA fileB
#      kitty +kitten themes
